<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="[이름]의 포트폴리오 웹사이트">
  <title>[이름] | 포트폴리오</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/hack-font@3.3.0/build/web/hack.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/theme.js" defer></script>
  <script src="js/github.js" defer></script>
  <script src="js/contact-modal.js" defer></script>
  <script src="js/main.js" defer></script>
</head>
<body>
  <header class="header">
    <a href="#hero" class="header__logo">[Logo]</a>

    <nav class="header__nav nav" aria-label="메인 메뉴">
      <ul class="nav__list">
        <li><a href="#hero" class="nav__link">홈</a></li>
        <li><a href="#about" class="nav__link">소개</a></li>
        <li><a href="#skills" class="nav__link">기술</a></li>
        <li><a href="#projects" class="nav__link">프로젝트</a></li>
        <li><a href="#contact" class="nav__link">문의</a></li>
      </ul>
    </nav>

    <div class="header__actions">
      <button type="button" class="theme-toggle" aria-label="다크 모드 전환">[icon: moon]</button>
      <button type="button" class="hamburger" aria-label="메뉴 열기" aria-expanded="false">[icon: menu]</button>
    </div>
  </header>

  <main>
    <!-- Hero: 인사말 -->
    <section id="hero" class="hero">
      <p class="hero__title">[인사말]</p>
      <p class="hero__subtitle">[한 줄 소개]</p>
    </section>

    <!-- About: 자기소개 + 프로필 이미지 -->
    <section id="about" class="about">
      <h3 class="section-title">About Me</h3>
      <div class="about__content">
        <img src="images/profile.svg" alt="[이름] 프로필 이미지" class="about__photo" width="160" height="160">
        <div class="about__text">
          <p>[자기소개]</p>
        </div>
      </div>
    </section>

    <!-- Contact: 아이콘 링크 + 문의 폼 (폼은 [icon: mail] 토글) -->
    <section id="contact" class="contact">
      <h3 class="section-title">Contact</h3>
      <ul class="contact__info">
        <li><a href="#" target="_blank" rel="noopener noreferrer" aria-label="GitHub 프로필">[icon: github]</a></li>
        <li><button type="button" class="form-toggle" aria-expanded="false" aria-haspopup="dialog" aria-label="문의 폼 열기">[icon: mail]</button></li>
      </ul>

      <!-- 문의 폼 모달: 기본 숨김 — [icon: mail] 버튼 클릭 시 js/contact-modal.js가 .visible 토글 -->
      <div class="contact__modal" role="dialog" aria-modal="true" aria-label="문의 폼">
        <form class="contact__form form" novalidate>
          <div class="contact__form-bar">
            <button type="button" class="contact__form-close" aria-label="문의 폼 닫기">[icon: x]</button>
            <button type="submit" class="contact__form-send" aria-label="메시지 보내기">[icon: send]</button>
          </div>

          <div class="form__field">
            <div class="form__field-row">
              <label for="name">이름</label>
              <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" required>
            </div>
            <p class="form__error" id="name-error"></p>
          </div>

          <div class="form__field">
            <div class="form__field-row">
              <label for="email">이메일</label>
              <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <p class="form__error" id="email-error"></p>
          </div>

          <div class="form__field form__field--message">
            <div class="form__field-row">
              <label for="message">메시지</label>
              <textarea id="message" name="message" rows="6" placeholder="메시지를 입력해주세요" required></textarea>
            </div>
            <p class="form__error" id="message-error"></p>
          </div>

          <p class="form__success" role="status"></p>
        </form>
      </div>
    </section>

    <!-- Skills: 기술 스택 목록 = 프로젝트 언어 필터
         (js/main.js가 GitHub 저장소 언어 목록으로 버튼을 동적 생성) -->
    <section id="skills" class="skills">
      <h3 class="section-title">Skills</h3>
      <ul class="skills__list">
        <li><button type="button" class="skills__filter" data-language="">[badge: 기술 1]</button></li>
        <li><button type="button" class="skills__filter" data-language="">[badge: 기술 2]</button></li>
        <li><button type="button" class="skills__filter" data-language="">[badge: 기술 3]</button></li>
      </ul>
    </section>

    <!-- Projects: GitHub API 연동 카드 (js/main.js에서 동적 렌더링) -->
    <section id="projects" class="projects">
      <h3 class="section-title">Projects</h3>
      <div class="projects__status" role="status" hidden>
        <!-- 로딩 / 에러 / 빈 상태 메시지가 표시됨 -->
      </div>
      <div class="projects__grid">
        <!-- GitHub 저장소 카드(article)가 동적으로 렌더링됨 -->
      </div>
    </section>

  </main>

  <footer class="footer">
    <p class="footer__copyright">&copy; 2026 [이름]. All rights reserved.</p>
  </footer>

  <button type="button" class="scroll-top" aria-label="맨 위로 이동">[icon: arrow-up]</button>
</body>
</html>
